          type: string
        description: 중개사 ID
      - name: limit
        in: query
        required: false
        schema:
          type: integer
        description: 매물 목록수
      - name: offset
        in: query
        required: false
        schema:
          type: integer
      - name: itemIds
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
        description: 해당 중개사가 관리하는 특정 매물들을 가져오고 싶을 때 사용
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v2/agents/{agentId}/local-inquiry:
    post:
      tags:
      - Misc
      summary: postLocalAgentInquiry
      operationId: postLocalAgentInquiry
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
        description: 중개사 번호
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                recommendAptRequestId:
                  type: integer
                  description: 추천 아파트 요청 id(recommend_apt_request.id)
                callType:
                  type: string
                  enum:
                  - call
                  - callback
                  description: '바로전화걸기: call, 콜백요청: callback'
                uuid:
                  type: string
                  description: 문의자의 UUID
              required:
              - callType
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v2/agents/{agentId}/reviews:
