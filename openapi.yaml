          format: double
      - name: startY
        in: query
        required: true
        schema:
          type: number
          format: double
      - name: endY
        in: query
        required: true
        schema:
          type: number
          format: double
      - name: map
        in: query
        required: true
        schema:
          type: string
      - name: level
        in: query
        required: true
        schema:
          type: integer
      - name: screenWidth
        in: query
        required: false
        schema:
          type: integer
      - name: screenHeight
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
