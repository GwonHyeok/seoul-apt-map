openapi: 3.1.0
info:
  title: 호갱노노 (Hogangnono) Web API
  version: 2.5.0-reverse-engineered
  description: "역공학으로 추출된 호갱노노(hogangnono.com) 비공식 OpenAPI 3.1 스펙.\n\n## 수집 방식\n- Chrome DevTools MCP를 통해 hogangnono.com 메뉴들을\
    \ 클릭하며 HAR 캡처\n- 프론트엔드 번들(`/dist/.../web/desktop.js`) 내부 `requestMaker({id, path, verb, parameters})` 호출 트리에서 endpoint\
    \ 정의 자동 추출\n- 검색·필터·평형·가격 등 주요 쿼리 파라미터는 번들 내 description 그대로 보존\n- 실제 호출 응답으로 envelope 형태 검증\n\n## 인증\n- 세션 쿠키: `connect.sid`\n\
    - 또는 헤더: `X-HOGANGNONO-API-KEY` + `X-HOGANGNONO-AT`(익명 ID)\n\n## 공통 헤더\n- `accept: application/json`\n- `x-hogangnono-app-name:\
    \ hogangnono`\n- `x-hogangnono-platform: desktop|mobile|app`\n- `x-hogangnono-api-version: 2.5.0`\n- `x-hogangnono-release-version:\
    \ 2.5.0.x`\n- `x-hogangnono-at`: 익명 ID\n- `x-hogangnono-ct`: 클라이언트 timestamp(ms)\n- `x-hogangnono-event-log`: 이벤트 로그 해시\n\
    - `x-hogangnono-event-duration`: 이벤트 지속시간(ms)\n\n## 응답 envelope\n대부분의 v2 endpoint:\n```\n{ \"status\": \"success\", \"\
    data\": ... }\n{ \"status\": \"error\", \"message\": \"...\" }\n```\n\n## 자주 쓰이는 enum\n- `tradeType`: 0=매매, 1=전세, 2=월세\n\
    - `aptType`: -1=ALL, 0=APT, 1=OFFICETEL, -3=AUCTION, -4=RECONSTRUCTION,\n  -5=OFFER_APT, -6=OFFER_OFFICETEL, -7=OFFER_APT_GOVERNMENT,\
    \ -8=OFFER_APT_COMMERCIAL\n- `auctionState`: -1=NONE, 0=NEW, 1=ONE_FAIL, 2=TWO_FAIL_OVER, 99=SELLING\n- `rankType` (최신):\
    \ 0=이번주, 1=지난주, 2=이번달, 3=지난달, 4=올해, 5=작년\n- `rankOrder`: PRICE_ASC, PRICE_DESC, PERCENTAGE_ASC, PERCENTAGE_DESC\n- `aisleTypes`\
    \ (현관구조): 1=계단식, 2=복도식, 4=복합식 (콤마 구분)\n- `heatTypes` (난방방식): 1=지역난방, 2=중앙난방, 3=개별난방 (콤마 구분)\n- `householderType`: 0=집주인-자가,\
    \ 1=집주인-임대, 2=세입자-전세, 3=세입자-월세\n- `offerType`: commercial=민간, government=공공\n- `communityType`: apts | expert-columns\
    \ | regions\n"
servers:
- url: https://hogangnono.com
  description: Production
- url: https://static.hogangnono.com
  description: Static asset CDN
tags:
- name: Apartment
- name: Asset / Loan
- name: Auction
- name: B2B
- name: Chat
- name: Community
- name: Map
- name: Map Overlay
- name: Misc
- name: News
- name: Notifications
- name: Ranking
- name: Sale (My)
- name: Search
- name: Subscriptions / Offers
- name: User & Auth
security:
- sessionCookie: []
- apiKeyHeader: []
- {}
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: connect.sid
    apiKeyHeader:
      type: apiKey
      in: header
      name: X-HOGANGNONO-API-KEY
  responses:
    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    StatusEnvelope:
      type: object
      required:
      - status
      properties:
        status:
          type: string
          enum:
          - success
          - error
        data: {}
        message:
          type: string
    Error:
      type: object
      properties:
        status:
          type: string
          enum:
          - error
        message:
          type: string
    LatLng:
      type: object
      properties:
        lat:
          type: number
        lng:
          type: number
    LatLon:
      type: object
      properties:
        lat:
          type: number
        lon:
          type: number
    AptCluster:
      type: object
      additionalProperties: true
      properties:
        id:
          type: integer
        region_code:
          type: string
        lat:
          type: number
        lng:
          type: number
        poiType:
          type: string
          enum:
          - cluster
          - apt
          - dong
        real_trade_price:
          type: number
          description: 실거래가 평균 (만원)
        real_rent_price:
          type: number
          description: 실전세가 평균 (만원)
        portal_trade_price:
          type: number
        portal_rent_price:
          type: number
        realtime:
          type: object
          properties:
            visitor:
              type: integer
            rank:
              type: integer
        content:
          type: object
          additionalProperties: true
    SearchSuggestion:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
          description: 단지 hash
        type:
          type: integer
        type_name:
          type: string
        name:
          type: string
        address:
          type: string
        road_address:
          type: string
        household:
          type: integer
        trade_count:
          type: integer
        region_code:
          type: string
        rank_point:
          type: number
        lat:
          type: number
        lng:
          type: number
        location:
          $ref: '#/components/schemas/LatLon'
        start_date:
          type: string
          format: date-time
paths:
  /api/v2/activity-logs/collect:
    get:
      tags:
      - Misc
      summary: collectByQuery
      operationId: collectByQuery
      parameters:
      - name: type
        in: query
        required: true
        schema:
          type: string
      - name: version
        in: query
        required: true
        schema:
          type: string
      - name: platform
        in: query
        required: true
        schema:
          type: string
      - name: user-agent
        in: header
        required: true
        schema:
          type: string
      - name: adid
        in: query
        required: false
        schema:
          type: string
      - name: sid
        in: query
        required: false
        schema:
          type: string
      - name: appsflyerId
        in: query
        required: false
        schema:
          type: string
      - name: manufacturer
        in: query
        required: false
        schema:
          type: string
      - name: modelVersion
        in: query
        required: false
        schema:
          type: string
      - name: osVersion
        in: query
        required: false
        schema:
          type: string
      - name: releaseVersion
        in: query
        required: false
        schema:
          type: string
      - name: logSeq
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - Misc
      summary: collectByBody
      operationId: collectByBody
      parameters:
      - name: user-agent
        in: header
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                version:
                  type: string
                platform:
                  type: string
                adid:
                  type: string
                sid:
                  type: string
                appsflyerId:
                  type: string
                manufacturer:
                  type: string
                modelVersion:
                  type: string
                osVersion:
                  type: string
                releaseVersion:
                  type: string
                logSeq:
                  type: string
                data:
                  type: string
              required:
              - type
              - version
              - platform
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v2/ads:
