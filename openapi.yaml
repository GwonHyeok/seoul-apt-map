      - Misc
      summary: postAgentReview
      operationId: postAgentReview
      parameters:
      - name: agentId
        in: path
        required: true
        schema:
          type: string
        description: 중개사 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reviewRequestId:
                  type: integer
                  description: 리뷰요청 Id
                score:
                  type: string
                content:
                  type: string
              required:
              - reviewRequestId
              - score
              - content
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
