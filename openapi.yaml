        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v2/b2b/alimtalk/inquiry-answered/item:
    post:
      tags:
      - B2B
      summary: sendItemInquiryAnswered
      operationId: sendItemInquiryAnswered
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
