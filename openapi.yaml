                agentId:
                  type: string
                  description: 중개사 id
                userMobile:
                  type: string
                  description: 사용자가 문의한 전화번호.
                inquiryDate:
                  type: string
                  description: 사용자의 문의일시
                zigbangAptId:
                  type: string
                  description: 직방아파트 ID
              required:
