          format: double
      - name: map
        in: query
        required: true
        schema:
          type: string
      - name: level
        in: query
        required: true
        schema:
          type: integer
      - name: screenWidth
        in: query
        required: false
        schema:
          type: integer
      - name: screenHeight
        in: query
        required: false
        schema:
          type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v2/ad-managers/adid-groups:
